<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Login - HF Controll</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="auth.css" />
    <meta name="theme-color" content="#4A2410" />
  </head>
  <body>
    <div class="container px-4">
      <div class="login-card">
        <!-- Logo -->
        <div class="text-center mb-4">
          <div class="brand-icon mb-2">
            <i class="fa-solid fa-horse-head"></i>
          </div>
          <h3 class="auth-title">Bem-vindo</h3>
          <p class="auth-subtitle mt-1">HF Controll — Gestão do Rancho</p>
        </div>

        <!-- Formulário -->
        <form id="formLogin">
          <div class="input-group mb-3">
            <span class="input-group-text"
              ><i class="fa-solid fa-user"></i
            ></span>
            <input
              type="text"
              class="form-control"
              id="username"
              placeholder="Nome de usuário"
              required
              autocapitalize="none"
            />
          </div>

          <div class="input-group mb-4">
            <span class="input-group-text"
              ><i class="fa-solid fa-lock"></i
            ></span>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Senha"
              required
            />
          </div>

          <div
            id="msgErro"
            class="alert alert-danger d-none py-2 small text-center rounded-3"
            role="alert"
          ></div>

          <button
            type="submit"
            class="btn btn-primary w-100 btn-login"
            id="btnEntrar"
          >
            <i class="fa-solid fa-right-to-bracket me-2"></i> Entrar
          </button>
        </form>

        <!-- Rodapé -->
        <div class="divider mt-4">
          <span>HF Controll</span>
        </div>
        <p
          class="text-center mb-0"
          style="font-size: 0.78rem; color: var(--texto-suave)"
        >
          Gestão inteligente do seu rancho
        </p>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
